<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body class="d-flex align-items-center justify-content-center vh-100 bg-light">
    <div class="container text-center">
        <a href="../../index.html" class="btn btn-white shadow-sm rounded-pill px-4 mb-4">← Back to Portfolio</a>
        
        <main class="dashboard-container">
            <h1 class="h5 text-uppercase fw-bold text-primary mb-3">System Status</h1>
            <div class="card stat-box mx-auto shadow-lg border-0 border-top border-5 border-primary p-5">
                <h2 class="display-4 fw-bold text-primary">Active</h2>
                <p class="lead">System is running 100%</p>
                <span class="badge bg-light text-secondary rounded-pill p-2">Last Checked: Just Now</span>
            </div>
        </main>
    </div>
</body>
</html>
